apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: 'ai-tool'
        static_configs:
          - targets: ['ai-tool-service:80']
        metrics_path: /metrics
      - job_name: 'data-lineage-agent'
        static_configs:
          - targets: ['data-lineage-agent.data-lineage.svc.cluster.local:80']
        metrics_path: /metrics
