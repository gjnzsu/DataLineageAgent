# Cloud Build pipeline — builds, tests, pushes, and deploys the image.
# Trigger this manually or connect to a GitHub repo in Cloud Build.
#
# Required Cloud Build service account permissions:
#   - roles/container.developer  (to push to GCR and deploy to GKE)
#   - roles/storage.admin        (for GCR bucket writes)
#
# Substitution variables (set in Cloud Build trigger or --substitutions flag):
#   _CLUSTER_NAME : GKE cluster name
#   _CLUSTER_ZONE : GKE cluster zone (e.g. us-central1-a)

substitutions:
  _CLUSTER_NAME: data-lineage-cluster
  _CLUSTER_ZONE: us-central1-a
  _IMAGE: gcr.io/$PROJECT_ID/data-lineage-agent

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build the image (runs tests in the builder stage)
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - $_IMAGE:$SHORT_SHA
      - --tag
      - $_IMAGE:latest
      - --cache-from
      - $_IMAGE:latest
      - .

  # 2. Push both tags to Container Registry
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    waitFor: [build]
    args: [push, "$_IMAGE:$SHORT_SHA"]

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    waitFor: [build]
    args: [push, "$_IMAGE:latest"]

  # 3. Get GKE credentials
  - name: gcr.io/cloud-builders/kubectl
    id: get-credentials
    waitFor: [push-sha, push-latest]
    args:
      - container
      - clusters
      - get-credentials
      - $_CLUSTER_NAME
      - --zone
      - $_CLUSTER_ZONE
      - --project
      - $PROJECT_ID
    entrypoint: gcloud

  # 4. Apply namespace + PVC + secret template (idempotent)
  - name: gcr.io/cloud-builders/kubectl
    id: apply-infra
    waitFor: [get-credentials]
    args: [apply, -f, k8s/namespace.yaml, -f, k8s/pvc.yaml]

  # 5. Update deployment image to the new SHA tag
  - name: gcr.io/cloud-builders/kubectl
    id: deploy
    waitFor: [apply-infra]
    args:
      - set
      - image
      - deployment/data-lineage-agent
      - data-lineage-agent=$_IMAGE:$SHORT_SHA
      - --namespace=data-lineage

  # 6. Apply service (idempotent)
  - name: gcr.io/cloud-builders/kubectl
    id: apply-service
    waitFor: [deploy]
    args: [apply, -f, k8s/service.yaml]

images:
  - $_IMAGE:$SHORT_SHA
  - $_IMAGE:latest
