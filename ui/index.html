<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Lineage Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; margin: 0; }

    #sidebar {
      width: 320px; min-width: 280px; background: #1a1d2e; border-right: 1px solid #2d3748;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar h1 { font-size: 15px; padding: 16px; border-bottom: 1px solid #2d3748; color: #90cdf4; letter-spacing: 0.5px; }
    #filters { padding: 12px 16px; border-bottom: 1px solid #2d3748; }
    #filters h3 { font-size: 11px; text-transform: uppercase; color: #718096; margin-bottom: 8px; }
    .filter-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; cursor: pointer; }
    .filter-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    #stats { padding: 12px 16px; border-bottom: 1px solid #2d3748; font-size: 12px; color: #a0aec0; }
    #stats span { display: block; margin-bottom: 4px; }
    #node-detail { flex: 1; padding: 16px; overflow-y: auto; }
    #node-detail h3 { font-size: 12px; text-transform: uppercase; color: #718096; margin-bottom: 10px; }
    #node-detail pre { font-size: 11px; color: #90cdf4; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
    #node-detail .placeholder { color: #4a5568; font-size: 13px; }

    #main { flex: 1; position: relative; overflow: hidden; }
    #graph-container { width: 100%; height: 100%; }
    svg { width: 100%; height: 100%; }

    .node circle { stroke-width: 2px; cursor: pointer; transition: r 0.15s; }
    .node circle:hover { r: 10; }
    .node.selected circle { stroke: #fff !important; stroke-width: 3px; }
    .node text { font-size: 10px; fill: #cbd5e0; pointer-events: none; }

    .link { fill: none; stroke-opacity: 0.5; }

    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #718096; font-size: 14px; }
    #error-msg { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #742a2a; color: #fed7d7; padding: 10px 20px; border-radius: 6px; font-size: 13px; display: none; }

    /* Chat drawer */
    #app-shell { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; }
    #top-area { display: flex; flex: 1; overflow: hidden; }
    #chat-drawer { background: #1a1d2e; border-top: 1px solid #2d3748; display: flex; flex-direction: column; }
    #chat-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; cursor: pointer; user-select: none; font-size: 13px; color: #90cdf4; border-bottom: 1px solid #2d3748; }
    #chat-header span { font-weight: 600; }
    #chat-toggle-btn { background: none; border: none; color: #90cdf4; cursor: pointer; font-size: 14px; }
    #chat-clear-btn { background: none; border: 1px solid #2d3748; color: #718096; cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    #chat-body { display: flex; flex-direction: column; height: 220px; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .chat-msg.user { align-self: flex-end; background: #2b4c7e; color: #e2e8f0; }
    .chat-msg.agent { align-self: flex-start; background: #2d3748; color: #e2e8f0; }
    .chat-msg.error { align-self: flex-start; background: #742a2a; color: #fed7d7; }
    #chat-input-row { display: flex; gap: 8px; padding: 8px 16px; border-top: 1px solid #2d3748; }
    #chat-input { flex: 1; background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 6px; padding: 8px 12px; font-size: 13px; outline: none; }
    #chat-input:focus { border-color: #4299e1; }
    #chat-send-btn { background: #2b6cb0; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
    #chat-send-btn:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }
    #chat-drawer.collapsed #chat-body { display: none; }
  </style>
</head>
<body>
<div id="app-shell">
  <div id="top-area">

    <div id="sidebar">
      <h1>Data Lineage Graph</h1>
      <div id="filters">
        <h3>Filter by Stage</h3>
        <div id="filter-list"></div>
      </div>
      <div id="stats">
        <span id="stat-nodes">Nodes: —</span>
        <span id="stat-edges">Edges: —</span>
        <span id="stat-run">Run: —</span>
      </div>
      <div id="node-detail">
        <h3>Node Detail</h3>
        <p class="placeholder">Click a node to inspect it.</p>
      </div>
    </div>

    <div id="main">
      <div id="loading">Loading lineage data...</div>
      <div id="error-msg"></div>
      <div id="graph-container"></div>
    </div>

  </div>

  <div id="chat-drawer">
    <div id="chat-header">
      <span>&#9650; Ask the Lineage Agent</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="chat-clear-btn">Clear</button>
        <button id="chat-toggle-btn">&#9660;</button>
      </div>
    </div>
    <div id="chat-body">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask a question about the data lineage..." autocomplete="off" />
        <button id="chat-send-btn">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
const STAGE_COLORS = {
  PROVIDER: '#718096',
  BRONZE:   '#4299e1',
  SILVER:   '#48bb78',
  GOLD:     '#ed8936',
};
const DEFAULT_COLOR = '#9f7aea';

const stageOrder = ['PROVIDER', 'BRONZE', 'SILVER', 'GOLD'];
let hiddenStages = new Set();
let allNodes = [], allEdges = [];
let simulation, svg, linkGroup, nodeGroup, selectedNode = null;

function colorOf(stage) {
  return STAGE_COLORS[stage] || DEFAULT_COLOR;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function buildFilters() {
  const list = document.getElementById('filter-list');
  list.innerHTML = '';
  stageOrder.forEach(stage => {
    const item = document.createElement('label');
    item.className = 'filter-item';
    item.innerHTML = `
      <input type="checkbox" checked data-stage="${stage}">
      <span class="filter-dot" style="background:${colorOf(stage)}"></span>
      <span>${stage}</span>`;
    item.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) hiddenStages.delete(stage);
      else hiddenStages.add(stage);
      applyFilter();
    });
    list.appendChild(item);
  });
}

function applyFilter() {
  if (!nodeGroup) return;
  nodeGroup.selectAll('.node')
    .style('display', d => hiddenStages.has(d.stage) ? 'none' : null);
  linkGroup.selectAll('.link')
    .style('display', d => {
      const srcHidden = hiddenStages.has((allNodes.find(n => n.node_id === d.source.node_id || n.node_id === d.source) || {}).stage);
      const tgtHidden = hiddenStages.has((allNodes.find(n => n.node_id === d.target.node_id || n.node_id === d.target) || {}).stage);
      return (srcHidden || tgtHidden) ? 'none' : null;
    });
}

function showNodeDetail(node) {
  const panel = document.getElementById('node-detail');
  const pretty = JSON.stringify({
    node_id: node.node_id,
    stage: node.stage,
    data_type: node.data_type,
    label: node.label,
    record_id: node.record_id,
    attributes: node.attributes,
    created_at: node.created_at,
  }, null, 2);
  panel.innerHTML = `<h3>Node Detail</h3><pre>${pretty}</pre>`;
}

function renderGraph(graph) {
  document.getElementById('loading').style.display = 'none';

  allNodes = graph.nodes || [];
  allEdges = graph.edges || [];

  document.getElementById('stat-nodes').textContent = `Nodes: ${allNodes.length}`;
  document.getElementById('stat-edges').textContent = `Edges: ${allEdges.length}`;
  document.getElementById('stat-run').textContent = `Run: ${(graph.run_id || '').slice(0, 8)}...`;

  buildFilters();

  const container = document.getElementById('graph-container');
  const W = container.clientWidth, H = container.clientHeight;

  svg = d3.select('#graph-container').append('svg');

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 20).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#4a5568');

  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));

  linkGroup = g.append('g').attr('class', 'links');
  nodeGroup = g.append('g').attr('class', 'nodes');

  const nodeById = Object.fromEntries(allNodes.map(n => [n.node_id, n]));

  const links = allEdges.map(e => ({
    ...e,
    source: e.source_node_id,
    target: e.target_node_id,
  }));

  const linkSel = linkGroup.selectAll('.link')
    .data(links).enter().append('line')
    .attr('class', 'link')
    .attr('stroke', '#4a5568')
    .attr('stroke-width', 1.2)
    .attr('marker-end', 'url(#arrow)');

  const nodeSel = nodeGroup.selectAll('.node')
    .data(allNodes).enter().append('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on('click', (e, d) => {
      nodeGroup.selectAll('.node').classed('selected', false);
      d3.select(e.currentTarget).classed('selected', true);
      selectedNode = d;
      showNodeDetail(d);
    });

  nodeSel.append('circle')
    .attr('r', 7)
    .attr('fill', d => colorOf(d.stage))
    .attr('stroke', d => d3.color(colorOf(d.stage)).brighter(1));

  nodeSel.append('text')
    .attr('x', 10).attr('y', 4)
    .text(d => d.label.length > 28 ? d.label.slice(0, 28) + '…' : d.label);

  simulation = d3.forceSimulation(allNodes)
    .force('link', d3.forceLink(links).id(d => d.node_id).distance(80).strength(0.5))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('x', d3.forceX().x(d => {
      const idx = stageOrder.indexOf(d.stage);
      return (idx < 0 ? 2 : idx) * (W / (stageOrder.length + 1)) + W / (stageOrder.length + 1);
    }).strength(0.3))
    .on('tick', () => {
      linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
             .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}

// Fetch and render
fetch('/api/lineage')
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${r.statusText}`);
    return r.json();
  })
  .then(renderGraph)
  .catch(err => {
    document.getElementById('loading').style.display = 'none';
    showError(`Failed to load lineage: ${err.message}. Make sure the API server is running and the pipeline has been executed.`);
  });
</script>
<script>
// Chat drawer
const chatDrawer = document.getElementById('chat-drawer');
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');
const chatSendBtn = document.getElementById('chat-send-btn');
const chatClearBtn = document.getElementById('chat-clear-btn');
const chatToggleBtn = document.getElementById('chat-toggle-btn');

let chatHistory = []; // full messages array sent to /api/chat

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Greeting on load
appendMessage('agent', 'What can I help you with? Ask me about data lineage, transformations, upstream/downstream dependencies, or pipeline statistics.');

chatToggleBtn.addEventListener('click', () => {
  const collapsed = chatDrawer.classList.toggle('collapsed');
  chatToggleBtn.textContent = collapsed ? '\u25b2' : '\u25bc';
});

chatClearBtn.addEventListener('click', () => {
  chatHistory = [];
  chatMessages.innerHTML = '';
  appendMessage('agent', 'Conversation cleared. What can I help you with?');
});

async function sendMessage() {
  const question = chatInput.value.trim();
  if (!question) return;

  chatInput.value = '';
  chatInput.disabled = true;
  chatSendBtn.disabled = true;
  appendMessage('user', question);
  chatHistory.push({ role: 'user', content: question });
  const thinking = document.createElement('div');
  thinking.className = 'chat-msg agent';
  thinking.textContent = '...';
  chatMessages.appendChild(thinking);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory, question })
    });
    const data = await res.json();
    chatMessages.removeChild(thinking);
    if (!res.ok) {
      appendMessage('error', 'Error: ' + (data.detail || 'Unknown error'));
    } else {
      chatHistory = data.messages;
      appendMessage('agent', data.answer);
    }
  } catch (err) {
    chatMessages.removeChild(thinking);
    appendMessage('error', 'Network error: ' + err.message);
  } finally {
    chatInput.disabled = false;
    chatSendBtn.disabled = false;
    chatInput.focus();
  }
}

chatSendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
